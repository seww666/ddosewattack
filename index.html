<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StarCorp · SeWa666 — GitHub Files</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(60, 120, 255, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(180, 80, 255, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 255, 255, 0.01) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-window {
            flex: 1 1 380px;
            min-width: 300px;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(60px) saturate(180%);
            -webkit-backdrop-filter: blur(60px) saturate(180%);
            border-radius: 44px;
            padding: 2.4rem 2.2rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 
                0 30px 80px rgba(0, 0, 0, 0.8),
                inset 0 0.5px 0 rgba(255, 255, 255, 0.04),
                0 0 0 0.5px rgba(255, 255, 255, 0.02);
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .glass-window::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -30%;
            width: 160%;
            height: 80%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }

        .twin-container {
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 2.4rem;
            justify-content: center;
            align-items: stretch;
            position: relative;
            z-index: 1;
        }

        .window-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2.2rem;
            padding-bottom: 0.6rem;
            position: relative;
            z-index: 2;
        }

        .window-header h2 {
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #f0f9ff 0%, #b3daff 90%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .window-header h2 i {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.01);
            padding: 0.3rem;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.01);
        }

        .status-badge {
            font-size: 0.6rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.01);
            padding: 0.4rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.12);
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.55rem;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .field label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.8px;
            color: rgba(255, 255, 255, 0.08);
            margin-left: 0.8rem;
        }

        .field label i {
            margin-right: 6px;
            opacity: 0.2;
        }

        .field input {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 1rem 1.6rem;
            font-size: 1rem;
            font-weight: 400;
            color: #fff;
            transition: all 0.3s ease;
            outline: none;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .field input:focus {
            border-color: rgba(120, 180, 255, 0.08);
            background: rgba(255, 255, 255, 0.01);
            box-shadow: 0 0 30px rgba(60, 140, 255, 0.02), inset 0 1px 4px rgba(0, 0, 0, 0.5);
        }

        .login-btn {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 1rem 2rem;
            font-weight: 500;
            color: #d0e6ff;
            font-size: 1rem;
            backdrop-filter: blur(8px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-top: 0.6rem;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.01);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.01) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-btn i {
            color: #7eb3ff;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.01);
            border-color: rgba(255, 255, 255, 0.03);
            transform: scale(1.01);
            box-shadow: 0 8px 40px rgba(60, 150, 255, 0.02);
            color: white;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .auth-status {
            font-size: 0.65rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-end;
            padding-right: 0.5rem;
            margin-top: 0.2rem;
        }

        .auth-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.5s;
            box-shadow: 0 0 6px rgba(0,0,0,0.2);
        }

        .dot.green {
            background: #5dffa0;
            box-shadow: 0 0 20px rgba(70, 255, 130, 0.08);
        }

        .dot.red {
            background: #ff6b6b;
            box-shadow: 0 0 20px rgba(255, 70, 70, 0.05);
        }

        .download-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin: 0.5rem 0 0.6rem;
            flex: 1;
            align-content: start;
            position: relative;
            z-index: 2;
            min-height: 200px;
        }

        .glass-item {
            background: rgba(255, 255, 255, 0.005);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.4rem 0.4rem 1rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.005);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            min-height: 120px;
            justify-content: center;
        }

        .glass-item:hover {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.01);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .item-name {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            background: rgba(255,255,255,0.005);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            word-break: break-all;
            max-width: 100%;
        }

        .item-name i {
            margin-right: 6px;
            opacity: 0.15;
        }

        .download-btn {
            background: rgba(255, 255, 255, 0.005);
            border: 1px solid rgba(255, 255, 255, 0.005);
            border-radius: 60px;
            padding: 0.4rem 1.2rem;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.65rem;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
            cursor: default;
        }

        .download-btn i {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.02);
            transition: 0.3s;
        }

        .download-btn.active {
            cursor: pointer;
            border-color: rgba(255, 255, 255, 0.01);
            background: rgba(255, 255, 255, 0.005);
            color: rgba(255, 255, 255, 0.15);
        }

        .download-btn.active i {
            color: #5f9eff;
        }

        .download-btn.active:hover {
            background: rgba(255, 255, 255, 0.005);
            border-color: rgba(255, 255, 255, 0.02);
            color: #fff;
            transform: scale(1.02);
        }

        .download-btn.active:hover i {
            color: #8abfff;
        }

        .download-btn.locked {
            opacity: 0.08;
            filter: grayscale(0.9);
            pointer-events: none;
        }

        .model-tag {
            font-size: 0.45rem;
            color: rgba(255, 255, 255, 0.01);
            letter-spacing: 1.5px;
            margin-top: 2px;
        }

        .window-footer {
            margin-top: 1.8rem;
            padding-top: 1rem;
            border-top: 0.5px solid rgba(255, 255, 255, 0.005);
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.02);
            font-size: 0.5rem;
            letter-spacing: 1.5px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }

        .window-footer span {
            background: rgba(255, 255, 255, 0.005);
            padding: 0.2rem 1rem;
            border-radius: 60px;
        }

        .watermark {
            position: absolute;
            bottom: 1.4rem;
            right: 1.8rem;
            font-size: 0.4rem;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.005);
            pointer-events: none;
            z-index: 1;
            font-weight: 300;
        }

        .ios-toast {
            position: fixed;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%) translateY(30px);
            background: rgba(20, 20, 30, 0.15);
            backdrop-filter: blur(50px) saturate(180%);
            -webkit-backdrop-filter: blur(50px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.02);
            border-radius: 80px;
            padding: 0.8rem 2.4rem;
            color: #f0f9ff;
            font-size: 0.9rem;
            font-weight: 400;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.2px;
            z-index: 999;
            display: flex;
            align-items: center;
            gap: 1rem;
            border-left: 2px solid #5f9eff;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            pointer-events: none;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
        }

        .ios-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        .ios-toast i {
            font-size: 1rem;
        }

        .loading-spinner {
            color: rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            justify-content: center;
            padding: 1rem;
        }

        .loading-spinner i {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.05);
        }

        @media (max-width: 820px) {
            .twin-container { gap: 1.8rem; }
            .glass-window { 
                flex: 1 1 340px;
                padding: 2rem 1.8rem;
                border-radius: 36px;
            }
        }
        @media (max-width: 500px) {
            body { padding: 0.8rem; }
            .glass-window {
                padding: 1.6rem 1.2rem;
                border-radius: 28px;
                min-width: 0;
            }
            .window-header h2 { font-size: 1.4rem; }
            .download-grid { gap: 0.6rem; }
            .glass-item { padding: 1rem 0.2rem; border-radius: 20px; min-height: 90px; }
            .login-btn { padding: 0.8rem 1.2rem; }
        }
    </style>
</head>
<body>

<div class="twin-container">

    <!-- ВІКНО 1: ЛОГІН -->
    <div class="glass-window" id="loginWindow">
        <div class="window-header">
            <h2><i class="fas fa-crown"></i> SeWa<span style="font-weight:300;">·</span>вхід</h2>
            <span class="status-badge"><i class="far fa-circle"></i> 2026</span>
        </div>

        <div class="login-form">
            <div class="field">
                <label for="loginField"><i class="fas fa-user-astronaut"></i> Логін</label>
                <input type="text" id="loginField" value="SeWa" placeholder="SeWa">
            </div>
            <div class="field">
                <label for="passField"><i class="fas fa-key"></i> Пароль</label>
                <input type="password" id="passField" value="123123" placeholder="123123">
            </div>
            <button class="login-btn" id="loginBtn">
                <i class="fas fa-arrow-right-to-bracket"></i> Увійти
            </button>
            <div class="auth-status" id="authStatus">
                <span class="dot" id="statusDot"></span>
                <span id="statusText">очікування</span>

            </div>
        </div>

        <div class="window-footer">

        </div>

    <!-- ВІКНО 2: ЗАВАНТАЖЕННЯ (файли з GitHub) -->
    <div class="glass-window" id="downloadWindow">
        <div class="window-header">
            <h2><i class="fas fa-cloud-arrow-down"></i> TToren-<span style="font-weight:300;">SeWa</span></h2>
            <span class="status-badge" id="downloadStatusBadge"><i class="fas fa-lock"></i> заблок.</span>
        </div>

        <div class="download-grid" id="downloadGrid">
            <!-- Тут будуть файли з GitHub -->
            <div class="loading-spinner" id="loadingIndicator">

        <div style="display: flex; justify-content: flex-end; margin-top: 0.1rem; font-size: 0.45rem; color: rgba(255,255,255,0.01); letter-spacing: 3px; position: relative; z-index:2;">
            <span id="repoInfo"># GitHub</span>
        </div>

        <div class="window-footer">
            <span><i class="fas fa-shield-alt"></i> Усі права захищені</span>
            <span>StarCorp-2026.2029</span>
        </div>
        <div class="watermark">⬇︎ DOWNLOAD</div>
    </div>
</div>

<!-- iOS-тост -->
<div class="ios-toast" id="iosToast">
    <i class="fas fa-circle-check" style="color: #6affa0;"></i>
    <span id="toastMessage">Готово</span>
</div>

<script>
    (function() {
        // =============================================
        // 🔧 НАЛАШТУВАННЯ GitHub
        // Замініть ці значення на свої:
        // =============================================
        const GITHUB_USERNAME = 'your-username';      // Ваш username на GitHub
        const GITHUB_REPO = 'your-repo';              // Назва репозиторію
        const GITHUB_BRANCH = 'main';                 // Гілка (main / master)
        const GITHUB_PATH = '';                       // Шлях до папки (напр. 'files/' або '' для кореня)

        // АБО використовуйте готовий тестовий репозиторій (розкоментуйте нижче):
        // const GITHUB_USERNAME = 'octocat';
        // const GITHUB_REPO = 'Hello-World';
        // const GITHUB_BRANCH = 'master';
        // const GITHUB_PATH = '';

        // =============================================

        // Елементи
        const loginBtn = document.getElementById('loginBtn');
        const loginField = document.getElementById('loginField');
        const passField = document.getElementById('passField');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const downloadStatusBadge = document.getElementById('downloadStatusBadge');
        const downloadGrid = document.getElementById('downloadGrid');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const repoInfo = document.getElementById('repoInfo');

        let isAuthorized = false;
        let fileItems = []; // збереження файлів

        // Функція показу тосту
        function showToast(message, type = 'success') {
            const toast = document.getElementById('iosToast');
            const toastMsg = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            if (type === 'success') {
                icon.className = 'fas fa-circle-check';
                icon.style.color = '#6affa0';
                toast.style.borderLeftColor = '#6affa0';
            } else if (type === 'error') {
                icon.className = 'fas fa-circle-xmark';
                icon.style.color = '#ff6b6b';
                toast.style.borderLeftColor = '#ff6b6b';
            } else {
                icon.className = 'fas fa-circle-info';
                icon.style.color = '#7eb3ff';
                toast.style.borderLeftColor = '#7eb3ff';
            }
            toastMsg.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 3200);
        }

        // Оновлення UI авторизації
        function updateUI(authState) {
            isAuthorized = authState;

            if (authState) {
                statusDot.className = 'dot green';
                statusText.textContent = 'авторизовано ✓';
                downloadStatusBadge.innerHTML = '<i class="fas fa-check-circle" style="color: #5dffa0;"></i> відкрито';
                downloadStatusBadge.style.color = 'rgba(255,255,255,0.15)';
                // Активувати кнопки
                document.querySelectorAll('.download-btn').forEach(btn => {
                    btn.classList.remove('locked');
                    btn.classList.add('active');
                });
            } else {
                statusDot.className = 'dot red';
                statusText.textContent = 'помилка входу';
                downloadStatusBadge.innerHTML = '<i class="fas fa-lock"></i> заблок.';
                downloadStatusBadge.style.color = 'rgba(255,255,255,0.05)';
                document.querySelectorAll('.download-btn').forEach(btn => {
                    btn.classList.add('locked');
                    btn.classList.remove('active');
                });
            }
        }

        // ========== ОТРИМАННЯ ФАЙЛІВ З GITHUB ==========
        async function fetchGitHubFiles() {
            try {
                // Перевірка чи налаштовано
                if (GITHUB_USERNAME === 'your-username' || GITHUB_REPO === 'your-repo') {
                    // Показуємо демо-файли якщо не налаштовано
                    showDemoFiles();
                    repoInfo.textContent = '# демо-режим (налаштуй GitHub)';
                    return;
                }

                const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${GITHUB_PATH}?ref=${GITHUB_BRANCH}`;
                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`GitHub API: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();

                // Фільтруємо тільки файли (не папки)
                const files = data.filter(item => item.type === 'file');

                if (files.length === 0) {
                    showToast('⚠️ Файлів у репозиторії не знайдено', 'error');
                    downloadGrid.innerHTML = `
                        <div style="grid-column: 1/-1; text-align:center; padding:2rem; color:rgba(255,255,255,0.05);">
                            <i class="fas fa-folder-open" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                            Немає файлів у репозиторії
                        </div>
                    `;
                    return;
                }

                repoInfo.textContent = `# ${GITHUB_USERNAME}/${GITHUB_REPO} (${files.length} файлів)`;
                renderFiles(files);

            } catch (error) {
                console.error('GitHub fetch error:', error);
                showToast('❌ Помилка завантаження файлів з GitHub', 'error');
                // Показуємо демо-файли при помилці
                showDemoFiles();
                repoInfo.textContent = '# помилка GitHub → демо-режим';
            }
        }

        // Рендеринг файлів у сітку
        function renderFiles(files) {
            // Зберігаємо файли для подальшого використання
            fileItems = files;

            // Очищуємо сітку, прибираємо індикатор завантаження
            downloadGrid.innerHTML = '';

            files.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'glass-item';
                item.dataset.file = file.name;

                // Визначаємо іконку за розширенням
                let icon = 'fa-file';
                const ext = file.name.split('.').pop().toLowerCase();
                if (['png', 'jpg', 'jpeg', 'gif', 'svg', 'webp'].includes(ext)) icon = 'fa-file-image';
                else if (['mp4', 'webm', 'mov'].includes(ext)) icon = 'fa-file-video';
                else if (['mp3', 'wav', 'flac'].includes(ext)) icon = 'fa-file-audio';
                else if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) icon = 'fa-file-zipper';
                else if (['pdf'].includes(ext)) icon = 'fa-file-pdf';
                else if (['doc', 'docx'].includes(ext)) icon = 'fa-file-word';
                else if (['xls', 'xlsx'].includes(ext)) icon = 'fa-file-excel';
                else if (['js', 'ts', 'jsx', 'tsx'].includes(ext)) icon = 'fa-file-code';
                else if (['html', 'htm'].includes(ext)) icon = 'fa-file-code';
                else if (['css', 'scss', 'sass'].includes(ext)) icon = 'fa-file-code';
                else if (['py', 'java', 'c', 'cpp', 'go', 'rs'].includes(ext)) icon = 'fa-file-code';
                else if (['json', 'xml', 'yaml', 'yml'].includes(ext)) icon = 'fa-file-code';
                else if (['txt', 'md'].includes(ext)) icon = 'fa-file-lines';

                const sizeKB = (file.size / 1024).toFixed(1);
                const sizeStr = file.size > 1024*1024 ? (file.size / (1024*1024)).toFixed(1) + ' MB' : sizeKB + ' KB';

                item.innerHTML = `
                    <div class="item-name"><i class="fas ${icon}"></i> ${file.name}</div>
                    <div class="download-btn locked" data-file="${file.name}" data-url="${file.download_url}">
                        <i class="fas fa-download"></i> Скачати
                    </div>
                    <div class="model-tag">${sizeStr}</div>
                `;

                downloadGrid.appendChild(item);
            });

            // Після рендерингу — оновлюємо стан кнопок
            updateUI(isAuthorized);

            // Додаємо обробники для кнопок скачування
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (!isAuthorized) {
                        showToast('🔒 Спочатку увійдіть в акаунт (SeWa / 123123)', 'error');
                        return;
                    }
                    const fileName = this.dataset.file || 'файл';
                    const fileUrl = this.dataset.url;
                    
                    if (fileUrl) {
                        // Скачуємо файл з GitHub
                        window.open(fileUrl, '_blank');
                        showToast(`⬇️ Завантаження ${fileName} ...`, 'info');
                    } else {
                        showToast(`⚠️ Не вдалося завантажити ${fileName}`, 'error');
                    }
                });
            });
        }

        // Демо-файли (якщо GitHub не налаштовано або помилка)
        function showDemoFiles() {
            const demoFiles = [
                { name: 'Model-1.bin', size: 2048, download_url: '#' },
                { name: 'Model-2.bin', size: 4096, download_url: '#' },
                { name: 'BlockOP-1.bin', size: 1024, download_url: '#' },
                { name: 'Scan-m1.bin', size: 512, download_url: '#' },
            ];
            
            downloadGrid.innerHTML = '';
            
            demoFiles.forEach((file) => {
                const item = document.createElement('div');
                item.className = 'glass-item';
                item.dataset.file = file.name;
                
                const ext = file.name.split('.').pop().toLowerCase();
                let icon = 'fa-file';
                if (['bin', 'dat'].includes(ext)) icon = 'fa-cube';
                
                const sizeStr = (file.size / 1024).toFixed(1) + ' KB';
                
                item.innerHTML = `
                    <div class="item-name"><i class="fas ${icon}"></i> ${file.name}</div>
                    <div class="download-btn locked" data-file="${file.name}" data-url="${file.download_url}">
                        <i class="fas fa-download"></i> Скачати
                    </div>
                    <div class="model-tag">${sizeStr}</div>
                `;
                
                downloadGrid.appendChild(item);
            });
            
            // Оновлюємо стан кнопок
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (!isAuthorized) {
                        showToast('🔒 Спочатку увійдіть в акаунт (SeWa / 123123)', 'error');
                        return;
                    }
                    const fileName = this.dataset.file || 'файл';
                    showToast(`⬇️ Демо-завантаження ${fileName} (налаштуйте GitHub)`, 'info');
                });
            });
            
            updateUI(isAuthorized);
            repoInfo.textContent = '# демо-режим (налаштуй GitHub)';
        }

        // ========== ОБРОБКА ЛОГІНУ ==========
        function handleLogin() {
            const loginVal = loginField.value.trim();
            const passVal = passField.value.trim();

            if (loginVal === 'SeWa' && passVal === '123123') {
                updateUI(true);
                showToast('✅ Вхід виконано! Доступ до завантажень відкрито.', 'success');
            } else {
                updateUI(false);
                showToast('❌ Невірний логін або пароль. Спробуйте SeWa / 123123', 'error');
                loginField.style.borderColor = 'rgba(255,80,80,0.06)';
                passField.style.borderColor = 'rgba(255,80,80,0.06)';
                setTimeout(() => {
                    loginField.style.borderColor = '';
                    passField.style.borderColor = '';
                }, 800);
            }
        }

        // ========== ПОДІЇ ==========
        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            handleLogin();
        });

        document.querySelectorAll('#loginField, #passField').forEach(field => {
            field.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });
        });

        // ========== ЗАПУСК ==========
        // Стартовий стан
        updateUI(false);

        // Завантажуємо файли з GitHub
        fetchGitHubFiles();

        console.log('✨ StarCorp SeWa666 · GitHub Files · iOS-стиль');
        console.log(`📁 Репозиторій: ${GITHUB_USERNAME}/${GITHUB_REPO}`);
    })();
</script>
</body>
</html>
